<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        #pokemon {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container mt-3 p-3">
        <div class="d-flex flex-column w-50 row-gap-3">
            <h1>Pokemon Explorer</h1>
            <div class="alert alert-danger d-none" id="alert">
                Pokemon not found
            </div>
            <div class="d-flex">
                <input type="text" id="search" placeholder="Search...">
                <button class="btn btn-primary" id="searchBtn">Search</button>
            </div>
            <button class="btn btn-primary" id="loadBtn">
                Load Pokemon
                <span id="loader" class="spinner-border spinner-border-sm d-none" role="status"
                    aria-hidden="true"></span>
            </button>
            <div id="pokemon">

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
