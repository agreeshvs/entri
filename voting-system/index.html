<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container p-3">
        <h2>Voting Machine</h2>

        <!-- <div class="row g-2 mt-3 justify-content-center">
            <div class="col-md-6" id="result">
                <span ></span>
            </div>
        </div> -->
        <div class="row g-2 mt-3">
            <div class="col-4">
                <div class="card" style="width: 18rem;">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQqH-GQP-sEAJqGXWr_xkGFxpR4HDdsVBonMQ&s"
                        class="card-img-top" alt="Dog" height="300px">
                    <div class="card-body text-center">
                        <h5 class="card-title">Dog</h5>
                        <p id="dogCount"></p>
                        <button href="#" class="btn btn-success" id="dogBtn">Vote</button>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card" style="width: 18rem;">
                    <img src="https://media.craiyon.com/2025-09-20/nvLqeMV5TDyvWevOEsPUVw.webp" class="card-img-top"
                        alt="Cat" height="300px">
                    <div class="card-body text-center">
                        <h5 class="card-title">Cat</h5>
                        <p id="catCount"></p>
                        <button href="#" class="btn btn-success" id="catBtn">Vote</button>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card" style="width: 18rem;">
                    <img src="https://i.pinimg.com/564x/7d/53/e6/7d53e62ac22cdfb348afc4652f5c385b.jpg"
                        class="card-img-top" alt="Lion" height="300px">
                    <div class="card-body text-center">
                        <h5 class="card-title">Lion</h5>
                        <p id="lionCount"></p>
                        <button href="#" class="btn btn-success" id="lionBtn">Vote</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-2 mt-3 justify-content-center">
            <div class="col-4">
                <button class="btn btn-success" id="resultBtn">
                    Result
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
