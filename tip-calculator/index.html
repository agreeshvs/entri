<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <section class="border-bottom p-2">
            <div class="row justify-content-center flex-column">
                <div class="col-md-8 col-lg-4">
                    <h2>TIP CALCULATOR</h2>
                </div>
                <div class="col-md-8 col-lg-4">
                    <form id="tipForm">
                        <div class="mb-3">
                            <label for="billAmountr">
                                Bill Amount
                            </label>
                            <input type="text" id="billAmount" placeholder="Enter the bill amount">
                        </div>
                        <div class="mb-3">
                            <label for="">Tip Percentage</label>
                            <select name="tipPercentage" id="percentage">
                                <option value="" disabled>Please Select</option>
                                <option value="5">5%</option>
                                <option value="10">10%</option>
                                <option value="15">15%</option>
                                <option value="20">20%</option>
                            </select>

                        </div>
                        <div class="mb-3">
                            <label for="">Number of people</label>
                            <input type="number" name="people" id="peopleCount"
                                placeholder="Enter the number of people">
                        </div>

                        <div class="mb-3">
                            <input class="btn btn-success" type="submit" value="Calculate">
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <section class="p-2">
            <span id="errorMessage" class="text-danger">
            </span>
        </section>

        <section class="p-2">

            <div class="row justify-content-center flex-column">
                <div class="col-md-8 col-lg-4">
                    <table class="table ">
                        <thead>
                            <tr>
                                <td>Tip Amount</td>
                                <td>Total Bill</td>
                                <td>Amount Per Person</td>
                            </tr>
                        </thead>
                        <tbody id="result">
                            <tr>
                                <td colspan="3">
                                    <span class="text-center text-muted">
                                        No Calculations Done
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <script src="js/script.js"></script>
</body>

</html>
